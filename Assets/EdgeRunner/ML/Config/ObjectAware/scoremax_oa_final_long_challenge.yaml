engine_settings:
  time_scale: 10
  target_frame_rate: -1
  capture_frame_rate: 60
  no_graphics: false

# FinalLongChallenge: long, fixed-layout ObjectAware level.
# Ordered sequence: low/low/high/low/Android/high/low/Android/high/Goal.
# Behavior Name: EdgeRunnerV5ScoreMaxObjectAware
# Observation Space Size in Unity: 111
# Actions/Branches: [3,2,2]
# Pass any starting checkpoint only on the mlagents-learn command line.
behaviors:
  EdgeRunnerV5ScoreMaxObjectAware:
    trainer_type: ppo

    hyperparameters:
      batch_size: 128
      buffer_size: 4096
      learning_rate: 1.0e-4
      beta: 5.0e-4
      epsilon: 0.15
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 1000000
    time_horizon: 128
    summary_freq: 1000
    checkpoint_interval: 20000
    keep_checkpoints: 10
