behaviors:
  EdgeRunnerBasic:
    trainer_type: ppo

    hyperparameters:
      batch_size: 128
      buffer_size: 2048
      learning_rate: 3.0e-6
      beta: 5.0e-6
      epsilon: 0.02
      lambd: 0.95
      num_epoch: 1
      learning_rate_schedule: linear

    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 3000
    time_horizon: 64
    summary_freq: 500
    keep_checkpoints: 6
    checkpoint_interval: 500